schema_version: 3
name: Gecko
slug: gecko
version: 0.1.0
description: "Health monitoring for the construct ecosystem. Runs automated checks, detects when constructs drift from their documentation, and tracks lifecycle status. Eight skills: patrol (automated network loops), observe (single network check), diagnose (deep investigation), report (findings summary), sweep-bonfire (walks the operator's local working copies and emits to the wall — sibling altitude to patrol), sense-estate (senses an arbitrary estate's coherence and emits a STATUS|SIGNAL|MISMATCH tile — the portable, fail-closed immune-relay doctor), sensing-path-friction (senses wrong-weight coordination paths — reach-in vs spawn-in-cell vs coord — and recurring cross-cell desire-paths that want to become rails, from the audit trail; DETECTOR-tier, surfaces never gates), sensing-construct-console (senses the live construct estate — declared ↔ governed ↔ earned — and emits the tile + Exhibit A + a three-row composition console; the composition+earned-authority sibling of probe_constructs's install-state)."
short_description: "Construct network health monitoring"
author: 0xHoneyJar
license: MIT
type: skill-pack
visibility: public

domain:
  - observability
  - ecosystem-intelligence

skills:
  - slug: patrol
    path: skills/patrol
  - slug: observe
    path: skills/observe
  - slug: diagnose
    path: skills/diagnose
  - slug: report
    path: skills/report
  - slug: sweep-bonfire
    path: skills/sweep-bonfire
  - slug: sense-estate
    path: skills/sense-estate
  - slug: sensing-path-friction
    path: skills/sensing-path-friction
  - slug: sensing-construct-console
    path: skills/sensing-construct-console

commands:
  - name: patrol
    path: commands/patrol.md
  - name: observe
    path: commands/observe.md
  - name: diagnose
    path: commands/diagnose.md
  - name: report
    path: commands/report.md
  - name: sweep-bonfire
    path: commands/sweep-bonfire.md
  - name: sense-estate
    path: commands/sense-estate.md
  - name: sensing-path-friction
    path: commands/sensing-path-friction.md
  - name: sensing-construct-console
    path: commands/sensing-construct-console.md

repository:
  url: https://github.com/0xHoneyJar/construct-gecko.git
  homepage: https://constructs.network/constructs/gecko

streams:
  reads: [Intent, Operator-Model]
  writes: [Signal, Verdict, Artifact]

events:
  emits:
    - type: gecko.health_observed
      description: Emitted after a single-pass observation completes
      data_schema:
        health_score: number
        constructs_checked: number
        anomalies: number
        timestamp: string
    - type: gecko.drift_detected
      description: Emitted when identity-reality drift exceeds threshold
      data_schema:
        construct_slug: string
        drift_type: string
        severity: string
        details: string
    - type: gecko.patrol_complete
      description: Emitted when a full patrol cycle finishes
      data_schema:
        iterations: number
        health_delta: number
        findings_path: string
    - type: gecko.diagnosis_complete
      description: Emitted when a deep diagnosis of a construct finishes
      data_schema:
        construct_slug: string
        finding_count: number
        recommendations: number
    - type: gecko.path_friction_observed
      description: Emitted after a path-friction sense completes — wrong-weight coordination acts + recurring cross-cell desire-paths (DETECTOR-tier; surfaced, never gated)
      data_schema:
        status: string
        cross_cell_mutates: number
        reach_in: number
        under_ceremony: number
        desire_paths: number
        top_desire_path: string
  consumes:
    - type: forge.k-hole.emergence_complete
      description: Picks up research emergence for ecosystem pattern matching

identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml

paths:
  reads:
    - "construct.yaml"
    - "identity/persona.yaml"
    - "skills/*/SKILL.md"
  writes:
    - "grimoires/gecko/"

composition_paths:
  reads:
    - "grimoires/"
compose_with:
  - observer
  - k-hole
pack_dependencies: []

capabilities:
  model_tier: opus
  danger_level: moderate
  effort_hint: large
  downgrade_allowed: false
  execution_hint: sequential
  requires:
    tool_calling: true
    thinking_traces: true
    vision: false

hooks:
  post_install: scripts/install.sh

quick_start:
  command: /observe
  description: Run a single-pass health check on the constructs network
